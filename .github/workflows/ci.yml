name: CI Quality Gate

on:
  pull_request:
    branches:
      - '**'

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload web bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-bundle
          path: dist
          if-no-files-found: error

  deploy-preview:
    name: Deploy PR Preview
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: github.event.pull_request.head.repo.full_name == github.repository
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Download web bundle artifact
        uses: actions/download-artifact@v8
        with:
          name: web-bundle
          path: dist

      - name: Prepare Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy preview to GitHub Pages
        id: deploy
        continue-on-error: true
        uses: actions/deploy-pages@v4
        with:
          preview: true

      - name: Comment preview URL
        if: steps.deploy.outcome == 'success'
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const previewUrl = "${{ steps.deploy.outputs.page_url }}";
            const body = `✅ Preview deployed: ${previewUrl}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });

      - name: Comment preview deploy warning
        if: steps.deploy.outcome == 'failure'
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const body = [
              "⚠️ Не удалось создать GitHub Pages preview deployment.",
              "Проверьте, что GitHub Pages включен в репозитории: https://github.com/${context.repo.owner}/${context.repo.repo}/settings/pages",
              "Также учтите, что `preview: true` в `actions/deploy-pages` доступен ограниченно (alpha) и может возвращать 404.",
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
